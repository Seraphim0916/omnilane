name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: set up Python 3.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.9"
      - name: bash syntax
        run: |
          for f in bin/omnilane scripts/*.sh scripts/lib/*.sh scripts/runners/*.sh install.sh; do
            bash -n "$f"
          done
      - name: perl syntax
        run: perl -c scripts/lib/job-timeout.pl
      - name: shellcheck
        run: shellcheck -S warning bin/omnilane scripts/*.sh scripts/lib/*.sh scripts/runners/*.sh install.sh
      - name: routing table smoke
        run: |
          out="$(bash scripts/dispatch.sh --list)"
          echo "$out"
          test "$(printf '%s\n' "$out" | wc -l)" -ge 8
      - name: Python syntax
        run: python -m py_compile scripts/ui.py tests/test_ui.py
      - name: Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: shell unit tests
        run: |
          OMNILANE_DEPTH=1 OMNILANE_TIMEOUT=1800 OMNILANE_TIMEOUT_PROBE=99 \
            bash tests/run.sh
      - name: no stale project name
        run: |
          ! grep -ri 'omniroute' --exclude-dir=.git --exclude-dir=.github .

  browser-behavior:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-browser.txt
      - name: install Playwright and Chromium
        run: |
          python -m pip install -r tests/requirements-browser.txt
          python -m playwright install --with-deps chromium
      - name: real-browser behavior tests
        env:
          OMNILANE_TEST_USE_PLAYWRIGHT_BROWSER: "1"
        run: |
          python -c "from tests.ui_browser_harness import browser_available; assert browser_available"
          python -m unittest tests.test_ui.FrontendBrowserBehaviorTests
